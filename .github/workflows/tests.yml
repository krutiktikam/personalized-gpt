name: Aura AI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: aura_user
          POSTGRES_PASSWORD: aura_password
          POSTGRES_DB: aura_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      HF_TOKEN: "mock_token" # Dummy token for CI

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.13
      uses: actions/setup-python@v5
      with:
        python-version: "3.13"
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Tests
      run: |
        # Run memory and logic tests (skip GPU-heavy model tests in CI if not configured)
        python -m pytest tests/test_memory.py tests/test_phase2.py
