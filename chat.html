<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI Companion</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; }
        
        /* Character Placeholder */
        #character-viewport {
            height: 200px;
            background: radial-gradient(circle, #2a2a2a 0%, #121212 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        #aura-character {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #007bff;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.5);
            transition: all 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
        }

        #chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .message { padding: 10px 15px; border-radius: 15px; max-width: 80%; line-height: 1.4; font-size: 0.95rem; }
        .user { align-self: flex-end; background: #007bff; color: white; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: #333; color: #eee; border: 1px solid #444; border-bottom-left-radius: 2px; }
        
        #input-area { padding: 15px; background: #1e1e1e; display: flex; gap: 10px; border-top: 1px solid #333; }
        input { flex: 1; padding: 12px; border-radius: 25px; border: none; background: #333; color: white; outline: none; padding-left: 20px; }
        select { padding: 10px; border-radius: 25px; background: #333; color: white; border: none; cursor: pointer; }
        button { padding: 10px 20px; background: #28a745; border: none; color: white; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }

        /* Responsive fixes for mobile */
        @media (max-width: 600px) {
            #character-viewport { height: 150px; }
            #aura-character { width: 80px; height: 80px; }
            #input-area { flex-wrap: wrap; }
            select { width: 100%; order: 2; }
            input { order: 1; }
            button { order: 3; width: 100%; }
        }
    </style>
</head>
<body>

<div id="character-viewport">
    <div id="aura-character">✨</div>
</div>

<div id="chat-container">
    <div class="message ai"><b>Aura:</b> Memory systems online. I remember our past conversations now. How can I help you today?</div>
</div>

<div id="input-area">
    <select id="mode-select">
        <option value="default">Supportive</option>
        <option value="lazy">Lazy</option>
        <option value="sarcastic">Sarcastic</option>
        <option value="motivational">Motivational</option>
        <option value="playful">Playful</option>
    </select>
    <input type="text" id="user-input" placeholder="Ask Aura anything..." onkeypress="if(event.key === 'Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script>
    const emotionMap = {
        'happy': { color: '#FFD700', icon: '😊', glow: 'rgba(255, 215, 0, 0.6)' },
        'sad': { color: '#1E90FF', icon: '😔', glow: 'rgba(30, 144, 255, 0.6)' },
        'angry': { color: '#FF4500', icon: '😠', glow: 'rgba(255, 69, 0, 0.6)' },
        'neutral': { color: '#007bff', icon: '✨', glow: 'rgba(0, 123, 255, 0.5)' }
    };

    function updateCharacter(emotion) {
        const char = document.getElementById('aura-character');
        const style = emotionMap[emotion] || emotionMap['neutral'];
        char.style.background = style.color;
        char.style.boxShadow = `0 0 40px ${style.glow}`;
        char.innerText = style.icon;
        
        // Add a little "pulse" animation
        char.style.transform = 'scale(1.1)';
        setTimeout(() => char.style.transform = 'scale(1)', 500);
    }

    async function sendMessage() {
        const input = document.getElementById('user-input');
        const mode = document.getElementById('mode-select').value;
        const container = document.getElementById('chat-container');

        if (!input.value.trim()) return;

        // Add User Message
        const userDiv = document.createElement('div');
        userDiv.className = 'message user';
        userDiv.textContent = input.value;
        container.appendChild(userDiv);

        const messageText = input.value;
        input.value = '';
        container.scrollTop = container.scrollHeight;

        // Visual feedback for "thinking"
        updateCharacter('neutral');

        try {
            const response = await fetch('http://127.0.0.1:8000/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: messageText, mode: mode })
            });
            const data = await response.json();

            // Add AI Message
            const aiDiv = document.createElement('div');
            aiDiv.className = 'message ai';
            aiDiv.innerHTML = `<b>Aura:</b> ${data.reply}`;
            container.appendChild(aiDiv);
            
            // Update Character Visuals based on emotion
            updateCharacter(data.emotion);

        } catch (error) {
            console.error('Error:', error);
            const errDiv = document.createElement('div');
            errDiv.className = 'message ai';
            errDiv.style.color = '#ff6b6b';
            errDiv.textContent = 'System Error: Connection to brain lost.';
            container.appendChild(errDiv);
        }
        container.scrollTop = container.scrollHeight;
    }
</script>

</body>
</html>
