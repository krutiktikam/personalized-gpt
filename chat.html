<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura AI | Personal Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .aura-glow { filter: drop-shadow(0 0 20px rgba(99, 102, 241, 0.5)); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .message-bubble { animation: fadeIn 0.3s ease-out forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        #chat-history::-webkit-scrollbar { width: 6px; }
        #chat-history::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Header / Character Viewport -->
    <header class="h-1/3 flex flex-col items-center justify-center relative border-b border-slate-800">
        <div id="aura-container" class="w-40 h-40 flex items-center justify-center relative">
            <!-- Aura Avatar -->
            <img id="aura-img" src="assets/aura_neutral.svg" alt="Aura" class="w-full h-full aura-glow pulse">
            <!-- Status Ring -->
            <div class="absolute inset-0 border-2 border-indigo-500/30 rounded-full animate-spin-slow"></div>
        </div>
        <h1 class="mt-4 text-xl font-light tracking-widest text-indigo-300 uppercase">Aura AI</h1>
        <div id="emotion-tag" class="mt-2 text-xs font-semibold px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-tighter">Neutral</div>
    </header>

    <!-- Chat Area -->
    <main id="chat-history" class="flex-1 overflow-y-auto p-6 space-y-4 max-w-4xl mx-auto w-full">
        <!-- Messages will appear here -->
        <div class="message-bubble flex justify-start">
            <div class="glass p-4 rounded-2xl rounded-bl-none max-w-[85%] text-slate-200">
                <p class="text-sm">Welcome back. My long-term memory is active. What's on your mind?</p>
            </div>
        </div>
    </main>

    <!-- Input Area -->
    <footer class="p-6 border-t border-slate-800 bg-slate-900/50">
        <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-4">
            <select id="mode-select" class="glass bg-slate-800 text-slate-300 rounded-xl px-4 py-3 outline-none focus:ring-2 focus:ring-indigo-500 transition-all text-sm">
                <option value="default">✨ Supportive</option>
                <option value="playful">🎮 Playful</option>
                <option value="sarcastic">😏 Sarcastic</option>
                <option value="motivational">🔥 Motivational</option>
                <option value="lazy">😴 Lazy</option>
            </select>
            <div class="flex-1 relative">
                <input type="text" id="user-input" 
                    class="w-full glass bg-slate-800 text-slate-200 rounded-xl px-6 py-3 pr-16 outline-none focus:ring-2 focus:ring-indigo-500 transition-all placeholder:text-slate-500" 
                    placeholder="Type a message..."
                    onkeypress="if(event.key === 'Enter') sendMessage()">
                <button onclick="sendMessage()" class="absolute right-2 top-2 bottom-2 bg-indigo-600 hover:bg-indigo-500 text-white px-4 rounded-lg transition-colors">
                    Send
                </button>
            </div>
            <button onclick="clearMemory()" class="glass border-rose-500/30 text-rose-400 hover:bg-rose-500/10 px-4 py-2 rounded-xl text-xs transition-all uppercase font-bold tracking-tight">
                Reset Memory
            </button>
        </div>
    </footer>

    <script>
        const auraImg = document.getElementById('aura-img');
        const emotionTag = document.getElementById('emotion-tag');
        const chatHistory = document.getElementById('chat-history');

        const assets = {
            'neutral': 'assets/aura_neutral.svg',
            'happy': 'assets/aura_happy.svg',
            'sad': 'assets/aura_neutral.svg', // Fallback
            'angry': 'assets/aura_happy.svg'  // Fallback
        };

        function updateUI(emotion) {
            const e = emotion.toLowerCase();
            auraImg.src = assets[e] || assets['neutral'];
            emotionTag.innerText = e;
            
            // Visual feedback
            auraImg.classList.add('scale-110');
            setTimeout(() => auraImg.classList.remove('scale-110'), 500);

            if (e === 'happy') {
                auraImg.style.filter = 'drop-shadow(0 0 30px rgba(244, 63, 94, 0.6))';
                emotionTag.className = 'mt-2 text-xs font-semibold px-3 py-1 rounded-full bg-rose-500/20 text-rose-400 uppercase tracking-tighter';
            } else {
                auraImg.style.filter = 'drop-shadow(0 0 20px rgba(99, 102, 241, 0.5))';
                emotionTag.className = 'mt-2 text-xs font-semibold px-3 py-1 rounded-full bg-slate-800 text-slate-400 uppercase tracking-tighter';
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const mode = document.getElementById('mode-select').value;
            const text = input.value.trim();

            if (!text) return;

            // Add User Message
            appendMessage('user', text);
            input.value = '';

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, mode: mode })
                });
                const data = await response.json();
                
                appendMessage('ai', data.reply);
                updateUI(data.emotion);
            } catch (err) {
                appendMessage('ai', '⚠️ Error: Brain link offline. Please check if the backend is running.');
            }
        }

        function appendMessage(sender, text) {
            const div = document.createElement('div');
            div.className = `message-bubble flex ${sender === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const innerClass = sender === 'user' 
                ? 'bg-indigo-600 text-white rounded-2xl rounded-br-none' 
                : 'glass text-slate-200 rounded-2xl rounded-bl-none';

            div.innerHTML = `
                <div class="${innerClass} p-4 max-w-[85%] shadow-xl">
                    <p class="text-sm leading-relaxed">${text}</p>
                </div>
            `;
            chatHistory.appendChild(div);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }

        async function clearMemory() {
            if (confirm('Are you sure you want to clear all my memories of you?')) {
                await fetch('http://127.0.0.1:8000/memory/clear', { method: 'DELETE' });
                location.reload();
            }
        }
    </script>
</body>
</html>
