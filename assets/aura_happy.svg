  <circle cx="100" cy="100" r="70" fill="url(#glowGradientHappy)" opacity="0.6" />
  <defs>
    <radialGradient id="glowGradientHappy">
      <stop offset="0%" stop-color="#fda4af" />
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0" />
