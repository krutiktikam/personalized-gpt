<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <circle cx="100" cy="100" r="80" fill="#6366f1" />
  <!-- Glow -->
  <circle cx="100" cy="100" r="70" fill="url(#glowGradient)" opacity="0.6" />
  <defs>
    <radialGradient id="glowGradient">
      <stop offset="0%" stop-color="#a5b4fc" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Eyes -->
  <circle cx="70" cy="85" r="8" fill="white" />
  <circle cx="130" cy="85" r="8" fill="white" />
  <!-- Mouth (Neutral) -->
  <rect x="80" y="130" width="40" height="4" rx="2" fill="white" />
</svg>
