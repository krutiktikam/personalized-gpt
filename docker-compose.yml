services:
  db:
    image: postgres:15
    container_name: aura_db
    environment:
      POSTGRES_USER: aura_user
      POSTGRES_PASSWORD: aura_password
      POSTGRES_DB: aura_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  ollama:
    image: ollama/ollama:latest
    container_name: aura_ollama
    ports:
      - "11434:11434"
    volumes:
      - ./models/ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: always

  aura-ai:
    build: .
    container_name: aura_ai_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
      - ./src:/app/src
      - ./config:/app/config
    environment:
      - HF_TOKEN=${HF_TOKEN}
      - PSQL_USER=${PSQL_USER:-aura_user}
      - PSQL_PASSWORD=${PSQL_PASSWORD:-aura_password}
      - PSQL_DB=${PSQL_DB:-aura_db}
      - PSQL_HOST=db
      - PSQL_PORT=5432
      - API_HOST=0.0.0.0
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - db
      - ollama
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: always

volumes:
  postgres_data:
