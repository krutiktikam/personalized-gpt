version: '3.8'

services:
  aura-ai:
    build: .
    container_name: aura_ai_service
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    environment:
      - HF_TOKEN=${HF_TOKEN}
    restart: always
